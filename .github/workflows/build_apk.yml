name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      # 【新增的绝杀步】：无视所有复杂的子目录，找出所有 apk 文件并复制到当前根目录
      - name: Extract APK to Root
        run: |
          find app/build/outputs/apk -name "*.apk" -exec cp {} . \;
          ls -la *.apk

      - name: Auto Release Direct APK
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "boominglrctest"
          # 此时 apk 已经在根目录了，直接抓取上传，绝对不会找不到
          files: "*.apk"